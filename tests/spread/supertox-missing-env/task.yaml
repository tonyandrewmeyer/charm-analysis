summary: Gracefully handle a non-existent tox environment
systems:
  - ubuntu-24.04

execute: |
  cd "$PROJECT_PATH"
  TMPDIR="$(mktemp -d)"
  CACHE="$TMPDIR/cache"

  # Clone a charm.
  cat > "$TMPDIR/test-charms.csv" <<'EOF'
  Team,Charm Name,Repository,Key Charm for this Team,Branch (if not the default),Notes
  Test,Element Web,https://github.com/canonical/element-web-operator,TRUE,,
  EOF
  get-charms --cache-folder "$CACHE" "$TMPDIR/test-charms.csv"

  cat > "$TMPDIR/super-tox.toml" <<'EOF'
  [ignore]
  EOF

  # Run with a tox environment that doesn't exist.
  output=$(super-tox \
    --cache-folder "$CACHE" \
    -c "$TMPDIR/super-tox.toml" \
    -e this_env_does_not_exist \
    --repo "element-web-operator" \
    --ops-source "" \
    2>&1) || true
  echo "$output"

  # Should not crash — should print a summary line.
  echo "$output" | MATCH "out of.*runs passed"

  rm -rf "$TMPDIR"

restore: |
  true
