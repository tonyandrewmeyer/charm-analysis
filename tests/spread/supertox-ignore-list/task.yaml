summary: Verify repos in ignore lists are skipped
systems:
  - ubuntu-24.04

execute: |
  cd "$PROJECT_PATH"
  TMPDIR="$(mktemp -d)"
  CACHE="$TMPDIR/cache"

  # Clone two charms.
  cat > "$TMPDIR/test-charms.csv" <<'EOF'
  Team,Charm Name,Repository,Key Charm for this Team,Branch (if not the default),Notes
  Test,Self Signed Certificates,https://github.com/canonical/self-signed-certificates-operator,TRUE,,
  Test,Element Web,https://github.com/canonical/element-web-operator,TRUE,,
  EOF
  get-charms --cache-folder "$CACHE" "$TMPDIR/test-charms.csv"

  # Config that ignores element-web-operator.
  cat > "$TMPDIR/super-tox.toml" <<'EOF'
  [ignore]
  expensive = ["element-web-operator"]
  EOF

  output=$(super-tox \
    --cache-folder "$CACHE" \
    -c "$TMPDIR/super-tox.toml" \
    -e unit \
    --ops-source "" \
    2>&1) || true
  echo "$output"

  # Should show skipping the ignored repo (collapse Rich line-wrapping).
  echo "$output" | tr '\n' ' ' | MATCH "Skipping.*element-web-operator.*expensive"

  # Summary should report only 1 repo tested (the non-ignored one).
  echo "$output" | MATCH "out of 1"

  rm -rf "$TMPDIR"

restore: |
  true
